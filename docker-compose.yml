---
services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5223:5223"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - etl-network
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: $DB_USERNAME
      POSTGRES_PASSWORD: $DB_PASSWORD
      POSTGRES_DB: $DB_NAME
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $DB_USERNAME -d $DB_NAME"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "$DB_PORT:$DB_PORT"
    networks:
      - etl-network

volumes:
  postgres_data:

networks:
  etl-network:
    driver: bridge
